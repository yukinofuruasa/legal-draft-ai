<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LegalDraft AI</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fb;--surface:#fff;--s2:#f1f3f7;
  --border:#d1d9e0;--text:#1a2332;--t2:#4a5568;--t3:#718096;
  --accent:#1e3a5f;--blue:#2563eb;--blue-l:#dbeafe;
  --green:#16a34a;--green-l:#dcfce7;
  --red:#dc2626;--red-l:#fee2e2;
  --amber:#d97706;--amber-l:#fef3c7;
  --indigo:#4f46e5;--indigo-l:#eef2ff;
  --r:8px;--rs:5px;
}
body{font-family:"Yu Gothic UI","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;
     font-size:13px;background:var(--bg);color:var(--text);line-height:1.5;
     height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{display:flex;align-items:center;justify-content:space-between;
     padding:9px 12px;background:var(--accent);flex-shrink:0;gap:8px}
.hdr-logo{display:flex;align-items:center;gap:7px}
.hdr-title{color:#e2e8f0;font-size:13px;font-weight:600}
.btn-analyze{display:flex;align-items:center;gap:5px;background:var(--blue);color:#fff;
             border:none;padding:5px 11px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer}
.btn-analyze:hover:not(:disabled){background:#1d4ed8}
.btn-analyze:disabled{opacity:.6;cursor:not-allowed}
.spin{width:11px;height:11px;border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.summary{display:flex;align-items:center;gap:5px;flex-wrap:wrap;
         padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:100px;font-size:11px;font-weight:600}
.pill-b{background:var(--blue-l);color:#1d4ed8}
.pill-r{background:var(--red-l);color:#b91c1c}
.pill-a{background:var(--amber-l);color:#92400e}
.pill-g{background:var(--green-l);color:#15803d}
.btn-xs{font-size:11px;color:var(--t3);background:none;border:1px solid var(--border);
        padding:2px 6px;border-radius:var(--rs);cursor:pointer;margin-left:auto}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.tab{flex:1;padding:8px 2px;background:none;border:none;font-size:11px;
     color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;
     gap:4px;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{background:var(--s2)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.bdg{background:var(--blue);color:#fff;font-size:10px;padding:0 4px;
     border-radius:100px;min-width:15px;text-align:center;line-height:15px;font-weight:700}
.content{flex:1;overflow-y:auto}
.pane{display:none;padding:10px 11px}
.pane.on{display:block}
.pdesc{font-size:11px;color:var(--t3);margin-bottom:9px;line-height:1.4}
.idle{padding:36px 20px;text-align:center;color:var(--t3);
      display:flex;flex-direction:column;align-items:center;gap:10px}
.idle p{font-size:13px;line-height:1.6}
.idle .sub{font-size:11px}
.empty{padding:24px 14px;text-align:center;color:var(--t3);
       display:flex;flex-direction:column;align-items:center;gap:8px;font-size:12px}
.tc{background:var(--surface);border:1px solid var(--border);
    border-radius:var(--r);margin-bottom:6px;overflow:hidden;cursor:pointer}
.tc:hover{border-color:#93c5fd}
.tc-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 11px}
.tc-name{font-weight:600;font-size:13px;color:var(--blue)}
.tc-badge{font-size:10px;background:var(--blue-l);color:var(--blue);padding:1px 6px;border-radius:100px;font-weight:600}
.tc-body{padding:0 11px 9px;border-top:1px solid var(--border);display:none}
.tc.open .tc-body{display:block}
.tc-ctx{font-size:11px;color:var(--t2);margin:7px 0;background:var(--s2);padding:5px 8px;border-radius:var(--rs);line-height:1.5}
.tc-actions{display:flex;gap:6px;flex-wrap:wrap}
.ic{border-radius:var(--r);margin-bottom:6px;padding:9px 11px;border-left:3px solid transparent}
.ic-err{border-left-color:var(--red);background:var(--red-l)}
.ic-wrn{border-left-color:var(--amber);background:var(--amber-l)}
.ic-fmt{border-left-color:var(--indigo);background:var(--indigo-l)}
.ic-hdr{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.ic-type{font-size:10px;color:#fff;padding:1px 6px;border-radius:100px;font-weight:700}
.ic-term{font-size:12px;font-weight:600}
.ic-desc{font-size:11px;color:var(--t2);margin-bottom:5px;line-height:1.5}
.ic-fix{font-size:11px;color:var(--indigo);margin-bottom:5px;font-style:italic}
.egov-search{display:flex;gap:6px;margin-bottom:10px}
.egov-input{flex:1;padding:6px 9px;border:1px solid var(--border);border-radius:var(--rs);font-size:12px;font-family:inherit}
.egov-input:focus{outline:none;border-color:var(--blue)}
.btn-search{background:var(--blue);color:#fff;border:none;padding:6px 11px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer}
.law-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 11px;cursor:pointer;margin-bottom:5px}
.law-item:hover{border-color:#93c5fd}
.law-item-title{font-weight:600;font-size:12px;color:var(--blue);margin-bottom:2px}
.law-item-sub{font-size:10px;color:var(--t3)}
.law-detail{margin-top:8px;border-top:1px solid var(--border);padding-top:8px;display:none}
.law-item.open .law-detail{display:block}
.law-art-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px}
.law-art-body{font-size:11px;color:var(--t2);line-height:1.6;white-space:pre-wrap;word-break:break-all}
.egov-link{display:inline-block;font-size:11px;color:var(--blue);margin-top:6px}
.btn-j{font-size:11px;color:var(--blue);background:var(--blue-l);border:none;padding:3px 8px;border-radius:var(--rs);cursor:pointer}
.btn-j:hover{background:#bfdbfe}
.btn-egov{font-size:11px;color:var(--green);background:var(--green-l);border:none;padding:3px 8px;border-radius:var(--rs);cursor:pointer}
.arow{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:9px}
.btn-fix{flex-shrink:0;font-size:11px;font-weight:600;background:var(--indigo);color:#fff;border:none;padding:4px 10px;border-radius:var(--rs);cursor:pointer}
.btn-fix:disabled{opacity:.6;cursor:not-allowed}
.sev-leg{display:flex;gap:10px;font-size:11px;margin-bottom:9px;color:var(--t2)}
.loading-row{display:flex;align-items:center;gap:8px;padding:16px;font-size:12px;color:var(--t3)}
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
       background:#1a2332;color:#fff;font-size:12px;padding:7px 14px;
       border-radius:100px;box-shadow:0 4px 12px rgba(0,0,0,.2);
       max-width:92%;text-align:center;z-index:200;pointer-events:none;
       opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect width="20" height="20" rx="5" fill="#1e3a5f"/>
      <path d="M5 6h10M5 10h7M5 14h9" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span class="hdr-title">LegalDraft AI</span>
  </div>
  <button class="btn-analyze" id="btnAnalyze" onclick="runAnalysis()">今すぐ分析</button>
</div>

<div class="summary" id="summary" style="display:none">
  <span class="pill pill-b" id="sumTerms">定義語 0</span>
  <span class="pill pill-r" id="sumErrors" style="display:none">エラー 0</span>
  <span class="pill pill-a" id="sumWarns" style="display:none">警告 0</span>
  <span class="pill pill-g" id="sumLaws" style="display:none">法令 0</span>
  <button class="btn-xs" onclick="clearHL()">HL解除</button>
</div>

<div class="tabs" id="tabBar" style="display:none">
  <button class="tab on" data-tab="terms" onclick="switchTab('terms')">定義語<span class="bdg" id="bdgTerms">0</span></button>
  <button class="tab" data-tab="format" onclick="switchTab('format')">書式<span class="bdg" id="bdgFormat">0</span></button>
  <button class="tab" data-tab="consist" onclick="switchTab('consist')">整合性<span class="bdg" id="bdgConsist">0</span></button>
  <button class="tab" data-tab="egov" onclick="switchTab('egov')">e-Gov<span class="bdg" id="bdgLaws">0</span></button>
</div>

<div class="content">
  <div class="idle" id="idleState">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <rect x="6" y="3" width="32" height="38" rx="4" stroke="var(--border)" stroke-width="1.5" fill="none"/>
      <path d="M13 12h18M13 18h12M13 24h15M13 30h10" stroke="var(--border)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <p>「今すぐ分析」を押して<br/>ドキュメントを解析します</p>
    <p class="sub">定義語 · 書式 · 整合性 · e-Gov法令参照</p>
  </div>
  <div class="pane on" id="pane-terms" style="display:none"><p class="pdesc" id="termsDesc"></p><div id="termsList"></div></div>
  <div class="pane" id="pane-format" style="display:none"><div class="arow"><p class="pdesc" id="formatDesc" style="margin-bottom:0"></p><button class="btn-fix" id="btnFix" onclick="applyFix()">一括修正</button></div><div id="formatList"></div></div>
  <div class="pane" id="pane-consist" style="display:none"><div class="sev-leg"><span style="color:var(--red)">● エラー</span><span style="color:var(--amber)">● 警告</span></div><div id="consistList"></div></div>
  <div class="pane" id="pane-egov" style="display:none">
    <div style="padding:10px 11px">
      <div class="egov-search">
        <input class="egov-input" id="egovInput" type="text" placeholder="法令名を検索（例: 民法）" onkeydown="if(event.key==='Enter')searchLaw()"/>
        <button class="btn-search" id="btnSearch" onclick="searchLaw()">検索</button>
      </div>
      <div id="detectedLaws"></div>
      <div id="lawResults"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- office.js は body の最後に読み込む -->
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
var G = { paragraphs:[], terms:[], formatIssues:[], consistIssues:[], detectedLaws:[], activeTab:'terms', analyzing:false, fixing:false };

// ═══════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════
function extractTerms(paragraphs) {
  var map = {};
  var pats = [
    /「([^」]{1,25})」(?:という|と総称する|とする|といい)/g,
    /（以下[、，]?\s*「([^」]{1,25})」(?:という|と総称する|とする)?）/g,
    /\(以下[、，]?\s*「([^」]{1,25})」(?:という|と総称する)?\)/g,
    /\(hereinafter\s+"([^"]{1,25})"\)/gi,
  ];
  paragraphs.forEach(function(text, idx) {
    pats.forEach(function(pat) {
      pat.lastIndex = 0;
      var m;
      while ((m = pat.exec(text)) !== null) {
        var term = m[1].trim();
        if (!term || term.length < 1) continue;
        if (!map[term]) {
          var s = Math.max(0, m.index - 15);
          var e = Math.min(text.length, m.index + 70);
          map[term] = { term:term, definition:text.slice(s,e).trim(), firstIdx:idx, count:1 };
        } else { map[term].count++; }
      }
    });
  });
  return Object.values(map).sort(function(a,b){ return a.firstIdx - b.firstIdx; });
}

function detectFormat(paragraphs) {
  var issues = []; var artN = 0; var listN = 0;
  paragraphs.forEach(function(raw, idx) {
    var t = raw.trim(); if (!t) { listN = 0; return; }
    var am = t.match(/^第\s*(\d+)\s*条/);
    if (am) { artN++; var cur = parseInt(am[1]);
      if (artN > 1 && cur !== artN) issues.push({ idx:idx, text:t.slice(0,55), issue:'条番号の不連続: 第'+cur+'条（第'+artN+'条が期待されます）', fix:'第'+artN+'条' });
      listN = 0; return; }
    var lm = t.match(/^(\d+)\.\s/);
    if (lm) { listN++; var cur2 = parseInt(lm[1]);
      if (cur2 !== listN && cur2 !== 1) issues.push({ idx:idx, text:t.slice(0,55), issue:'リスト番号の不連続: '+cur2+'（'+listN+'が期待）', fix:listN+'.' }); return; }
    if (/[０-９]/.test(t) && /[0-9]/.test(t)) issues.push({ idx:idx, text:t.slice(0,55), issue:'全角・半角数字が混在', fix:'半角数字に統一' });
    if (/[、。]/.test(t) && /[，．]/.test(t)) issues.push({ idx:idx, text:t.slice(0,55), issue:'句読点スタイルが混在（、。と，．）', fix:'どちらかに統一' });
  });
  return issues;
}

function checkConsist(paragraphs, terms) {
  var issues = [];
  var skip = new Set(['以下','甲','乙','丙','丁','当事者','本契約','本件','本条','前条','次条','前項','本項','同条','同項','前号']);
  var defCount = {};
  terms.forEach(function(t){ defCount[t.term] = (defCount[t.term]||0)+1; });
  Object.keys(defCount).forEach(function(term){
    if (defCount[term]>1) issues.push({ sev:'error', type:'定義重複', term:term, desc:'「'+term+'」が'+defCount[term]+'箇所で定義されています', idx:terms.find(function(t){return t.term===term;}).firstIdx });
  });
  paragraphs.forEach(function(text, idx) {
    var usePat = /「([^」]{1,20})」/g; var m;
    while ((m = usePat.exec(text)) !== null) {
      var w = m[1].trim(); if (skip.has(w) || w.length < 2) continue;
      var isDef = terms.some(function(t){ return t.term===w && t.firstIdx<=idx; });
      var hasDef = /「[^」]+」(?:という|と総称する|とする|といい)/.test(text) || /（以下[、，]?「/.test(text);
      if (!isDef && !hasDef) issues.push({ sev:'warning', type:'未定義語', term:w, desc:'「'+w+'」が参照されていますが定義が見当たりません', idx:idx });
    }
    var artRefRe = /第\s*(\d+)\s*条/g;
    while ((m = artRefRe.exec(text)) !== null) {
      var refN = parseInt(m[1]);
      var exists = paragraphs.some(function(p){ return new RegExp('^第\\s*'+refN+'\\s*条').test(p.trim()); });
      if (!exists) issues.push({ sev:'warning', type:'参照エラー', term:'第'+refN+'条', desc:'第'+refN+'条を参照していますが文書内に見つかりません', idx:idx });
    }
  });
  var seen = new Set();
  return issues.filter(function(i){ var k=i.type+':'+i.term+':'+i.idx; if(seen.has(k))return false; seen.add(k); return true; });
}

var LAW_NAMES = ['民法','商法','会社法','労働基準法','個人情報保護法','不正競争防止法','特許法','著作権法','消費者契約法','下請法','独占禁止法'];
function detectLawNames(paragraphs) {
  var found = new Set(); var text = paragraphs.join(' ');
  LAW_NAMES.forEach(function(n){ if(text.includes(n)) found.add(n); });
  var re = /([^\s「」（）、。]{2,10}法)/g; var m;
  while((m=re.exec(text))!==null) found.add(m[1]);
  return Array.from(found).filter(function(n){ return n.length>=2 && n.length<=15; }).slice(0,15);
}

// ═══════════════════════════════════════
// WORD API
// ═══════════════════════════════════════
function getParagraphs() {
  return Word.run(function(ctx) {
    var ps = ctx.document.body.paragraphs;
    ctx.load(ps, 'text');
    return ctx.sync().then(function() {
      var texts = [];
      for (var i = 0; i < ps.items.length; i++) {
        texts.push(ps.items[i].text || '');
      }
      return texts;
    });
  });
}

function highlightTerms(terms) {
  return Word.run(function(ctx) {
    var body = ctx.document.body;
    var searches = terms.slice(0,10).map(function(t) {
      return body.search('「'+t.term+'」', { matchCase:true });
    });
    searches.forEach(function(s){ ctx.load(s,'font'); });
    return ctx.sync().then(function() {
      searches.forEach(function(s) {
        s.items.forEach(function(r){ r.font.highlightColor = '#FFF3CD'; });
      });
      return ctx.sync();
    });
  });
}

function clearHL() {
  Word.run(function(ctx) {
    ctx.document.body.font.highlightColor = 'None';
    return ctx.sync();
  }).then(function(){ toast('ハイライトを解除しました'); }).catch(function(){});
}

function jumpTo(idx) {
  Word.run(function(ctx) {
    var ps = ctx.document.body.paragraphs;
    ctx.load(ps, 'text');
    return ctx.sync().then(function() {
      if (idx < ps.items.length) {
        ps.items[idx].select();
        return ctx.sync();
      }
    });
  }).catch(function(){});
}

function applyFix() {
  if (G.fixing) return;
  G.fixing = true;
  document.getElementById('btnFix').disabled = true;
  document.getElementById('btnFix').textContent = '修正中...';
  Word.run(function(ctx) {
    var ps = ctx.document.body.paragraphs;
    ctx.load(ps, 'text');
    return ctx.sync().then(function() {
      var artN=0, listN=0, fixed=0;
      var ops = [];
      for (var i=0; i<ps.items.length; i++) {
        var t = ps.items[i].text.trim(); if (!t) { listN=0; continue; }
        var am = t.match(/^第\s*(\d+)\s*条/);
        if (am) { artN++; var cur=parseInt(am[1]);
          if (cur!==artN) { ps.items[i].insertText(t.replace(/^第\s*\d+\s*条/,'第'+artN+'条'),'Replace'); fixed++; }
          listN=0; continue; }
        var lm = t.match(/^(\d+)\.\s/);
        if (lm) { listN++; var cur2=parseInt(lm[1]);
          if (cur2!==listN) { ps.items[i].insertText(t.replace(/^\d+\./,listN+'.'),'Replace'); fixed++; } }
      }
      return ctx.sync().then(function(){ return fixed; });
    });
  }).then(function(fixed){
    toast(fixed+'件を修正しました');
    if (fixed>0) runAnalysis();
  }).catch(function(e){ toast('修正エラー: '+e.message); })
  .finally(function(){ G.fixing=false; document.getElementById('btnFix').disabled=false; document.getElementById('btnFix').textContent='一括修正'; });
}

// ═══════════════════════════════════════
// e-Gov
// ═══════════════════════════════════════
function searchLaw() {
  var kw = document.getElementById('egovInput').value.trim();
  if (!kw) return;
  searchLawFor(kw);
}

function searchLawFor(keyword) {
  switchTab('egov');
  document.getElementById('egovInput').value = keyword;
  var el = document.getElementById('lawResults');
  el.innerHTML = '<div class="loading-row"><span class="spin" style="border-color:rgba(0,0,0,.15);border-top-color:var(--blue)"></span>検索中...</div>';
  fetch('https://laws.e-gov.go.jp/api/2/laws?keyword='+encodeURIComponent(keyword)+'&law_type=Act&limit=10')
    .then(function(r){ return r.json(); })
    .then(function(j){
      var laws = j.laws || [];
      if (!laws.length) { el.innerHTML='<div class="empty">「'+esc(keyword)+'」に一致する法令が見つかりませんでした</div>'; return; }
      el.innerHTML = laws.map(function(l,i){
        var id = (l.revision_info && l.revision_info.law_revision_id) || (l.law_info && l.law_info.law_id) || '';
        var title = (l.revision_info && l.revision_info.law_title) || (l.law_info && l.law_info.law_title) || '(不明)';
        var num = (l.law_info && l.law_info.law_num) || '';
        return '<div class="law-item" id="law'+i+'" onclick="toggleLaw('+i+',\''+esc(id)+'\')">'+
          '<div class="law-item-title">'+esc(title)+'</div>'+
          '<div class="law-item-sub">'+esc(num)+' <a href="https://laws.e-gov.go.jp/law/'+esc(id)+'" target="_blank" onclick="event.stopPropagation()" style="color:var(--blue);font-size:11px">e-Govで開く ↗</a></div>'+
          '<div class="law-detail" id="lawDetail'+i+'"><div class="loading-row">読み込み中...</div></div>'+
          '</div>';
      }).join('');
    })
    .catch(function(e){ el.innerHTML='<div class="empty">検索エラー。e-GovサイトはCORSを許可している場合のみ動作します。<br><a href="https://laws.e-gov.go.jp" target="_blank" style="color:var(--blue)">e-Govを直接開く ↗</a></div>'; });
}

function toggleLaw(i, lawId) {
  var item = document.getElementById('law'+i);
  var detail = document.getElementById('lawDetail'+i);
  if (item.classList.contains('open')) { item.classList.remove('open'); return; }
  item.classList.add('open');
  fetch('https://laws.e-gov.go.jp/api/2/law_data/'+lawId)
    .then(function(r){ return r.json(); })
    .then(function(j){
      var arts = (j.law_full_text && j.law_full_text.articles) || j.articles || [];
      if (!arts.length) { detail.innerHTML='<p style="font-size:11px;color:var(--t3);padding:8px 0">条文データを取得できませんでした。</p>'; return; }
      detail.innerHTML = arts.slice(0,6).map(function(a){
        return '<div style="margin-bottom:7px"><div class="law-art-title">'+esc(a.article_title||'')+'</div><div class="law-art-body">'+esc(a.article_body||'')+'</div></div>';
      }).join('<hr style="border:none;border-top:1px solid var(--border);margin:6px 0">') +
      '<a class="egov-link" href="https://laws.e-gov.go.jp/law/'+lawId+'" target="_blank">全文をe-Govで見る ↗</a>';
    })
    .catch(function(){ detail.innerHTML='<p style="font-size:11px;color:var(--t3);padding:8px 0"><a href="https://laws.e-gov.go.jp/law/'+lawId+'" target="_blank" style="color:var(--blue)">e-Govで直接確認する ↗</a></p>'; });
}

// ═══════════════════════════════════════
// ANALYSIS
// ═══════════════════════════════════════
function runAnalysis() {
  if (G.analyzing) return;
  G.analyzing = true;
  var btn = document.getElementById('btnAnalyze');
  btn.innerHTML = '<span class="spin"></span> 分析中...';
  btn.disabled = true;

  getParagraphs().then(function(paras) {
    G.paragraphs = paras;
    G.terms = extractTerms(paras);
    G.formatIssues = detectFormat(paras);
    G.consistIssues = checkConsist(paras, G.terms);
    G.detectedLaws = detectLawNames(paras);
    renderAll();
    document.getElementById('idleState').style.display = 'none';
    document.getElementById('summary').style.display = 'flex';
    document.getElementById('tabBar').style.display = 'flex';
    showPanes();
    var errN = G.consistIssues.filter(function(i){return i.sev==='error';}).length;
    toast('分析完了: 定義語'+G.terms.length+'件 / 問題'+(errN + G.formatIssues.length)+'件');
    if (G.terms.length) return highlightTerms(G.terms);
  }).catch(function(e) {
    console.error('Analysis error:', e);
    toast('エラー: ' + (e.message || String(e)));
  }).finally(function() {
    G.analyzing = false;
    btn.innerHTML = '今すぐ分析';
    btn.disabled = false;
  });
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function renderAll() {
  var errN = G.consistIssues.filter(function(i){return i.sev==='error';}).length;
  var wrnN = G.consistIssues.filter(function(i){return i.sev==='warning';}).length + G.formatIssues.length;
  document.getElementById('sumTerms').textContent = '定義語 '+G.terms.length;
  var er = document.getElementById('sumErrors'); er.textContent='エラー '+errN; er.style.display=errN?'inline-flex':'none';
  var wr = document.getElementById('sumWarns'); wr.textContent='警告 '+wrnN; wr.style.display=wrnN?'inline-flex':'none';
  var lw = document.getElementById('sumLaws'); lw.textContent='法令 '+G.detectedLaws.length; lw.style.display=G.detectedLaws.length?'inline-flex':'none';
  document.getElementById('bdgTerms').textContent = G.terms.length;
  document.getElementById('bdgFormat').textContent = G.formatIssues.length;
  document.getElementById('bdgConsist').textContent = G.consistIssues.length;
  document.getElementById('bdgLaws').textContent = G.detectedLaws.length;

  // Terms
  var tEl = document.getElementById('termsList');
  document.getElementById('termsDesc').textContent = G.terms.length ? G.terms.length+'件の定義語を検出しました。' : '定義語が見つかりませんでした。';
  tEl.innerHTML = G.terms.map(function(t,i){
    return '<div class="tc" id="tc'+i+'" onclick="toggleCard(\'tc'+i+'\')">' +
      '<div class="tc-hdr"><span class="tc-name">「'+esc(t.term)+'」</span><span class="tc-badge">'+t.count+'回使用</span></div>' +
      '<div class="tc-body"><div class="tc-ctx">…'+esc(t.definition)+'…</div>' +
      '<div class="tc-actions"><button class="btn-j" onclick="event.stopPropagation();jumpTo('+t.firstIdx+')">定義箇所へ</button>' +
      '<button class="btn-egov" onclick="event.stopPropagation();searchLawFor(\''+esc(t.term)+'\')">e-Govで検索</button></div></div></div>';
  }).join('');

  // Format
  document.getElementById('formatDesc').textContent = G.formatIssues.length ? G.formatIssues.length+'件の書式問題を検出しました。' : '書式の問題は見つかりませんでした。';
  document.getElementById('formatList').innerHTML = G.formatIssues.map(function(f){
    return '<div class="ic ic-fmt"><div class="ic-hdr"><span class="ic-type" style="background:#6366f1">フォーマット</span><span class="ic-term" style="font-size:11px">段落 '+(f.idx+1)+'</span></div>' +
      '<div class="ic-desc">'+esc(f.issue)+'</div><div class="ic-fix">→ '+esc(f.fix)+'</div>' +
      '<button class="btn-j" onclick="jumpTo('+f.idx+')">該当箇所へ</button></div>';
  }).join('');

  // Consist
  var cEl = document.getElementById('consistList');
  if (!G.consistIssues.length) {
    cEl.innerHTML = '<div class="empty"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="#16a34a" stroke-width="1.5"/><path d="M9 14l3.5 3.5 6.5-7" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>整合性の問題は見つかりませんでした</div>';
  } else {
    cEl.innerHTML = G.consistIssues.slice().sort(function(a,b){return a.sev==='error'?-1:1;}).map(function(i){
      var cls = i.sev==='error'?'ic-err':'ic-wrn'; var col = i.sev==='error'?'var(--red)':'var(--amber)';
      return '<div class="ic '+cls+'"><div class="ic-hdr"><span class="ic-type" style="background:'+col+'">'+esc(i.type)+'</span><span class="ic-term">「'+esc(i.term)+'」</span></div>' +
        '<div class="ic-desc">'+esc(i.desc)+'</div><button class="btn-j" onclick="jumpTo('+i.idx+')">該当箇所へ</button></div>';
    }).join('');
  }

  // eGov detected
  var dEl = document.getElementById('detectedLaws');
  dEl.innerHTML = G.detectedLaws.length ? '<p class="pdesc">文書内で検出した法令：</p><div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">'+
    G.detectedLaws.map(function(n){
      return '<button onclick="searchLawFor(\''+esc(n)+'\')" style="font-size:11px;padding:3px 9px;border:1px solid var(--border);border-radius:100px;background:var(--surface);cursor:pointer;color:var(--blue)">'+esc(n)+'</button>';
    }).join('')+'</div>' : '';
}

// ═══════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════
function switchTab(id) {
  G.activeTab = id;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('on', t.dataset.tab===id); });
  showPanes();
}
function showPanes() {
  ['terms','format','consist','egov'].forEach(function(id){
    var p = document.getElementById('pane-'+id);
    if (p) p.style.display = G.activeTab===id ? 'block' : 'none';
  });
}
function toggleCard(id){ document.getElementById(id).classList.toggle('open'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
var toastTimer;
function toast(msg){ var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(function(){ el.classList.remove('show'); },3000); }
